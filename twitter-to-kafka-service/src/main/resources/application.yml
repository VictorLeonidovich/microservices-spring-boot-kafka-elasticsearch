server:
  port: 8080

spring:
  application:
    name: twitter-to-kafka-service
  profiles:
    active: twitter_to_kafka
  config:
    # This is the "Modern" way to link to the Config Server
    # Use 'optional:' so the app starts even if the server is down
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      name: twitter-to-kafka-service,config-client
      server:
        git:
          uri: https://github.com/VictorLeonidovich/microservices-spring-boot-kafka-elasticsearch.git
          default-label: main
          username: VictorLeonidovich
          password: ${GITHUB_TOKEN}
          clone-on-start: true
          # Optional: ensures the server fails to start if the Git repo is unreachable
          fail-on-delivery-error: true
  # This replaces 'fail-fast' for the server's own startup check
  cloud.config.fail-fast: true